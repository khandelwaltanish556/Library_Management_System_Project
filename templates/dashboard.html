{% extends 'base.html' %}
{% block content %}

<h2 class="mb-4">Dashboard</h2>

<div class="card shadow p-3">
    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Quantity</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td>{{book[1]}}</td>
                <td>{{book[2]}}</td>
                <td>{{book[3]}}</td>
                <td>
                    <a href="/issue_book/{{book[0]}}" class="btn btn-success btn-sm">
                        Issue
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
